        //Anoymonous function-An anonymous function is a function definition without
        //  a specific name, created on-the-fly for short-term tasks, callbacks, or one-time use.

        let msg=function(){
            console.log("Hello ABES");

        }
        msg();

        //short code for above function

        let msg1=()=>console.log("Hello React");
        msg1();
        //arrow function witg multiple lines

        let msg2=(age)=>{
            if (age>=18){
                console.log("valid age");
            }
        }
        msg2(23);

    
        //call back function-A callback function is a function passed as an argument
        // into another function, intended to be executed ("called back") later—either
        //  immediately (synchronous) or after an asynchronous operation completes.

        function cal(a,b,callback){
            var num1=a;

            console.log("First number is " +num1);
            var num2=b;
            console.log("Second number is " +num2);
            var res=num1+num2;
            callback(res);
        }
         function display(res){
            console.log("Result is "+ res);
         }
         cal(3,4,display);
 
         //callback using set Timeout API

         function  greeting(){
            document.writeln("Hello Student");
         }
         function loading(){
            document.writeln("Data loading......");
         }

         loading();
         setTimeout(greeting, 2000);

         //callback hell....-Callback hell, or the "pyramid of doom," is a JavaScript anti-pattern occurring
         //  when multiple nested callbacks are used for asynchronous operations, creating deeply indented, 
         // unreadable, and hard-to-maintain code.

         //Javascript promises-JavaScript Promises are objects representing the eventual result 
         // of an asynchronous operation.

         //promises stages....
         //pending-operation started (not finished)
         //rejected - operation failed
         //filfilled- operation completed

         let promise=new Promise(function(resolve,reject){
            let myAge=23;
            if(myAge>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
         });
         promise.then(result=>console.log(result)).catch
         (error=>console.log(error));

         //async and await are modern JavaScript keywords that allow developers
         //  to write asynchronous code in a clean, synchronous-like style. They are 
         // syntactic sugar built on top of JavaScript Promises and make complex asynchronous 
         // operations and error handling much more readable and manageable than traditional 
         // promise chains or callbacks.
         //fetch api

         async function userData(){
            let userResponse=await fetch('https://dummyjson.com/products/1');
            let userDataRes=await userResponse.json();
            console.log(userDataRes);
         }
         userData();
         
         //async await using try catch

         async function productDetail(){
            let proRes=await fetch('https://dummyjson.com/products?limit=10&skip=10&select=title,price');
            let proResData=await proRes.json();
            try{
                 let proRes=await fetch('https://dummyjson.com/products?limit=10&skip=10&select=title,price');
            let proResData=await proRes.json();
            console.log(proResData);

            }
            catch(error){
                console.log("not vaild data " + error);
            }
         }
         productDetail();

         //IIFE-An Immediately Invoked Function Expression (IIFE), pronounced "iffy", is a JavaScript function that runs as soon as it is defined, 
         // without needing to be explicitly called later
         (function(){
            console.log("hello IIFE");
         })();
         //short code for above function
         (msg=>console.log("IIFE"))();

         //local storage-JavaScript's localStorage provides a way for web applications to store key-value pairs persistently in the user's browser, with no expiration date.
         //  This data remains available even after the browser is closed, and it is scoped to the specific domain (origin) that created it

         let myinfo={
            name:'Indu',
            mob_no:9625079495,
            class:'btech',
            year:1,
            address:"ghaziabad"
         };
         //convert object into json string
         let myinfodata=JSON.stringify(myinfo);

         //set the data
         localStorage.setItem('preferences',myinfodata);

         //get data
         let mypreference=localStorage.getItem('preferences');
         //retreive the data and convert into json object
         let myinfopre=JSON.parse(mypreference);
         //access keys
         console.log(myinfopre.name);

         //High order function-A higher-order function is a function that does at least one of the following: 
          //Takes one or more functions as arguments (often called callback functions).
           //Returns a function as its result.

           //map-Creates a new array by applying a provided function to every element in the original array.
           //  It is used for transforming data.


         let num=[3,5,4,6,67,4,3,6,8,9];
         let result=num.map(n=>n*2);
         console.log(result);

         //reduce-Applies a function against an accumulator and each element in the array to reduce it to a single value 
         // (e.g., a sum, a combined object, etc.

         let sum=num.reduce((total,n)=>total+n);
         console.log(sum);//115

         //filter-Creates a new array with only the elements that pass a test implemented by the provided function. 
         // It is used for selecting a subset of data.
         let sorting=num.filter(n=>n>3);
         console.log(sorting);

         //forEach- Executes a provided function once for each array element,
         //  typically for side effects (like logging to the console
         num.forEach((n)=>console.log(n*n));
         console.log(`updated array  is ${num}`);




         
         
    </script>
