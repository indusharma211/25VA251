<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js introduction</title>
</head>
<body>
    <h2>JAVASCRIPT</h2>
    <script>
        //js variables------container that keeps either value or not
        /*JavaScript variables are containers for storing data values and can be declared using the keywords var, let, or
         const. They are dynamically typed, meaning you don't need to specify the data type (like number or string) when declaring
          them, and the type can change during program execution*/
        
        //using var keyword
        var my_name="ABES";
        /*The document object in JavaScript represents the web page loaded in the browser and
         serves as an entry point into the web page's content, which is the DOM (Document Object Model) tree. 
         The DOM tree includes elements such as <body> and <table>, among many others. It provides functionality globally to the document,
         like how to obtain the page's URL and create new elements in the document.*/
        document.write(my_name);//output on browser
        console.log(my_name);//output on console

        //JS execution and scope in js (global and local scope)

        function hello(){
            var msg="thanks to visit";
            console.log(msg);
        }
        hello();

        //variable declaration using let and const
        let myrollno=2503201000578;
        console.log(myrollno);
         myrollno=2503201000579;//no redeclare but can be re-assigned
        console.log(myrollno);

        const mynumber=9560524229;
        console.log("my contact no is "+mynumber);
        
        mynumber=9560524228;
        console.log(mynumber);//const can not be reassigned 



    </script>
</body>
</html>
