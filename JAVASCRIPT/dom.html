<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM IN JS</title>
</head>
<body>
        <!--The Document Object Model (DOM) is a programming interface for web documents.
         It represents the structure and content of a document as a tree of objects, allowing programs to 
        dynamically access and update the content, structure, and style of a document.-->
        <h2>check your age to cast  the vote!</h2>
        <form action="">
            <input type="number" placeholder="enter your age" name="age" id="age"/>
        <input type="submit" value="submit" onclick="result()"/>
        </form>
        <script>
            function  result(){
                let myage=document.getElementById("age").value;
                if(myage>=18){
                    alert("ELIGIBLE");
                }
                else{
                    alert("NOT ELIGIBLE");
                }
            }
        </script>

    
</body>
</html>
